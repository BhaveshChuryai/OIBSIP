<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTask Pro | Advanced Task Management</title>
    <meta name="description" content="A powerful, premium task management application with deadlines, reminders, and dark mode.">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="dark">
    <div class="container">
        <!-- Header & Theme Toggle -->
        <header>
            <div class="brand">
                <h1>NexTask Pro</h1>
                <p class="subtitle" style="color: var(--text-secondary);">Your productivity, amplified.</p>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                <i data-lucide="moon"></i>
            </button>
        </header>

        <main>
            <!-- Stats Dashboard -->
            <section class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="totalTasks">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card" style="border-bottom: 3px solid var(--accent-primary);">
                    <span class="stat-value" id="pendingTasksCount">0</span>
                    <span class="stat-label">Pending</span>
                </div>
                <div class="stat-card" style="border-bottom: 3px solid var(--accent-success);">
                    <span class="stat-value" id="completedTasksCount">0</span>
                    <span class="stat-label">Completed</span>
                </div>
                <div class="stat-card" style="border-bottom: 3px solid var(--accent-danger);">
                    <span class="stat-value" id="expiredTasksCount">0</span>
                    <span class="stat-label">Expired</span>
                </div>
            </section>

            <!-- Search & Filters -->
            <section class="controls-row">
                <div class="search-wrapper">
                    <i data-lucide="search" size="18"></i>
                    <input type="text" id="searchInput" placeholder="Search tasks...">
                </div>
                <div class="filter-sort-wrapper">
                    <select id="filterStatus">
                        <option value="all">All Tasks</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="expired">Expired</option>
                    </select>
                    <select id="sortBy">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="deadline">By Deadline</option>
                    </select>
                </div>
            </section>

            <!-- Add Task Input -->
            <section class="input-section">
                <div class="input-main">
                    <input type="text" id="taskInput" placeholder="Enter task name..." autocomplete="off">
                    <button class="btn-add" id="addTaskBtn">
                        <i data-lucide="plus"></i>
                        <span>Add</span>
                    </button>
                </div>
                <div class="input-details">
                    <div class="deadline-input">
                        <i data-lucide="calendar"></i>
                        <span>Deadline:</span>
                        <input type="datetime-local" id="deadlineInput">
                    </div>
                </div>
            </section>

            <div class="tasks-container">
                <!-- Task Lists (Rendered by JS) -->
                <div class="task-list" id="mainTaskList"></div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition: opacity 0.3s ease;">
        <div class="input-section" style="width:90%; max-width:500px; gap:1.5rem; padding:2rem;">
            <h3 style="font-size:1.5rem;">Edit Task</h3>
            <input type="text" id="editInput" style="border-bottom:1px solid var(--card-border); padding:0.75rem 0;">
            <div class="deadline-input">
                <i data-lucide="calendar"></i>
                <span>New Deadline:</span>
                <input type="datetime-local" id="editDeadline">
            </div>
            <div style="display:flex; gap:1rem; justify-content: flex-end; margin-top: 1rem;">
                <button id="cancelEdit" class="action-btn" style="width:auto; padding:0 1.5rem;">Cancel</button>
                <button id="saveEdit" class="btn-add">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Audio for completion -->
    <audio id="completeSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
